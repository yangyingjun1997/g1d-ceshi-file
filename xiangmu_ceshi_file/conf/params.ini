[sdk_params]
near_edge_min_mm = 150
near_edge_max_mm = 250
height_threshold_mm = 50
search_step_height_m = 0.05
search_backup_m = 0.2
max_search_attempts = 3
max_adjust_retries = 2
small_deviation_mm = 50
# 微调模式：enhanced（新版，默认）或 classic（旧版简单微调）
weitiao_mode = enhanced
enhanced_max_loops = 5
# 旋转方式：1（一次性调整）2（分2段调整）
rotate_segments = 1

# ---- V2.0 新增参数 ----
# 立柱全行程（米）
full_travel_m = 0.427
# 相机到基座坐标变换（米），用于 YOLO 抓取点坐标转换
cam_to_base_x = 0.3
cam_to_base_y = 0.0
cam_to_base_z = 0.2
# 全局步骤超时（秒），0 表示不限
step_timeout_sec = 180
# HTTP 请求重试次数（YOLO / adjust / arm API）
http_max_retries = 2
# HTTP 重试间隔（秒）
http_retry_delay = 1.0
# 升降命令超时（秒）
lift_timeout_sec = 30
# 机械臂最大重试次数
arm_max_retries = 2
# 机械臂重试间隔（秒）
arm_retry_delay_sec = 1.5
# 旋转速度（rad/s）
rotate_speed = 0.5
# 平移速度（m/s）
move_speed = 0.2

# ===== 网络拓扑 =====
[network]
# 5端（外部监控端 NUC）
host_5 = 192.168.123.5
# 164端（机器人本体 PC4）
host_164 = 192.168.123.164
# 4090服务器（GPU/数据库）
host_4090 = 192.168.100.100
# SSH 默认用户名
ssh_user = unitree
# 机器人网络接口
robot_if = eth0

# ===== SSH 每设备独立用户（覆盖 ssh_user 默认值）=====
[ssh]
# NUC（5端 192.168.123.5）
ssh_user_5 = robot
# PC4（164端 192.168.123.164）
ssh_user_164 = unitree
# 4090服务器（192.168.100.100）
ssh_user_4090 = ubuntu

# ===== 服务端口 =====
[service]
# 状态监控（5端）
port_monitor = 28087
# 控制API（5端）
port_control_api = 28091
# Offset检测（164端）
port_offset_detector = 28089
# 订单看板（4090端）
port_dashboard = 28090
# 服务状态面板（5端）
port_service_dashboard = 28092
# YOLO识别（164端）
port_yolo = 18081
# 机械臂API（164端）
port_arm = 18083
# 微调服务（164端）
port_adjust = 18084
# 夹爪API（164端）
port_gripper = 18080
# 导航API（5端本地）
port_nav = 8080

# ===== 数据库 =====
[database]
host = 127.0.0.1
port = 3306
user = bwton
password = bwton@888
database = digitaltwins

# ===== ROS2 =====
[ros2]
# 话题名称
topic_hispeed = /hispeed_state
topic_odom = /agv/odom
topic_cmd_vel = /cmd_vel
# ROS_DOMAIN_ID
domain_id = 0
