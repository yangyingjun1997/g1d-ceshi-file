# ============================================================
# G1D 任务清单配置文件 V5.15
# 每个 [Task*] 段定义一个任务
#
#   name        : 香烟种类（必须与 YOLO 可识别的标签一致，如 XiongMao / Xizi_Liqun）
#   point       : 点位库中的点位名称（可选）；不写时系统按 name 查找第一个匹配点位
#   count       : 执行次数（正整数）
#   actions     : 自定义步骤序列，用英文逗号分隔，按顺序执行。
#                 不写时使用默认流程：nav_start -> weitiao -> pick -> backup -> nav_end -> place -> reset
#
# 可用步骤（当前版本支持）:
#   ┌─ 导航 ─────────────────────────────────────
#   │ nav_start              : 导航到抓取点（start_point）
#   │ nav_end                : 导航到放置点（end_point）
#   │ nav_start_lift(高度)   : 【并行】导航到抓取点 + 立柱升至指定高度
#   │ nav_end_lift(高度)     : 【并行】导航到放置点 + 立柱升降
#   ├─ 视觉对齐 ─────────────────────────────────
#   │ weitiao                : 视觉微调（底盘对齐 + 高度调整 + 搜索）
#   │                          可通过 sdk_params.ini 中的 weitiao_mode 切换 classic/enhanced
#   │ adjust_retry           : 重复微调最多3次（内部调用 weitiao）
#   │ verify_distance        : 检查当前 YOLO 检测距离是否在可抓范围内（<600mm），否则报错
#   ├─ 机械臂 ───────────────────────────────────
#   │ pick                   : 机械臂执行 PICK（使用最新 YOLO 抓取点坐标）
#   │ place                  : 机械臂执行 PLACE，放到放置点
#   │ reset                  : 机械臂执行 RESET
#   ├─ 底盘运动 ─────────────────────────────────
#   │ backup(距离)            : 后退指定距离（单位米）
#   │ rotate(角度)            : 原地旋转指定角度（单位度）
#   │ rotate_lift(角度,高度)  : 【并行】旋转 + 立柱升降
#   │ move(方向,距离)         : 平移，方向仅支持 forward / backward，距离单位米
#   ├─ 夹爪/吸盘 ────────────────────────────────
#   │ gripper(suck)          : 吸合
#   │ gripper(release)       : 张开
#   │ gripper(status)         : 查询状态（仅打印）
#   └─ 升降 ─────────────────────────────────────
#     lift_to(高度)           : 绝对高度控制，单位米（自动截断至 0~0.42m）
#
# 并行步骤说明：
#   nav_start_lift(高度)     等同于同时执行 nav_start + lift_to，节省时间
#   nav_end_lift(高度)       等同于同时执行 nav_end + lift_to
#   rotate_lift(角度,高度)   等同于同时执行 rotate + lift_to
#   并行中任一动作失败则整个步骤失败
#
# 微调模式切换（在 sdk_params.ini 中设置）：
#   weitiao_mode = enhanced （默认，新版视觉对齐，含搜索策略）
#   weitiao_mode = classic  （旧版，简单底盘微调+高度阈值升降）
#
# 任务失败策略（在脚本顶部设置）：
#   CONTINUE_ON_TASK_ERROR=true  当前任务失败后跳过，继续执行下一个 Task
#   CONTINUE_ON_TASK_ERROR=false 默认行为，失败后立即停止整个清单
#
# 注意事项：
#   - 步骤之间用英文逗号分隔，按顺序执行，失败则中断当前任务。
#   - 机械臂动作通过 18083 HTTP API 调用，失败会抛出异常并被主控捕获。
#   - 点位库 point_inf 每行格式：点位名称 x y z qx qy qz qw 香烟种类
#   - end_point 为特殊放置点，香烟种类填 "end"
# ============================================================

[Task1]
name = XiongMao
point = ShelfA-1
count = 1
actions = nav_start_lift(0.02), weitiao, pick, backup(0.45), rotate_lift(190,0.02), place, rotate(100)

[Task2]
name = Xizi_Liqun
point = ShelfB-2
count = 1
actions = nav_start_lift(0.42), weitiao, pick, backup(0.45), rotate_lift(190,0.02), place, reset